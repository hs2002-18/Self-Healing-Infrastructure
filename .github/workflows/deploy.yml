name: Application Deployment

on:
  push:
      branches:
        - main
      paths:
        - 'docker-compose.yml'
        - 'auto_heal.sh'
        - 'app/**'
        - '.github/workflows/deploy.yml'
  workflow_run:
    workflows: ["Infra Pipeline"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
   # if: ${{ github.event.workflow_run.conclusion == 'success' }} 
    runs-on: ubuntu-latest

    env:
      TF_VAR_public_key: ${{ secrets.TF_VAR_PUBLIC_KEY }}

    steps:
      
      - name: Checkout Code
        uses: actions/checkout@v3

      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      
      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-south-1

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Debug Terraform Output
        run: terraform output
        working-directory: terraform

      - name: Get EC2 Public IP
        id: ip
        run: |
          terraform init
          IP=$(terraform output -raw public_ip)
          echo "ip=$IP" >> $GITHUB_OUTPUT
        working-directory: terraform

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.ip.outputs.ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo apt update
            sudo apt install -y docker.io docker-compose git

            # Clone repo if not exists
            if [ ! -d "Self-Healing-Infrastructure" ]; then
              git clone https://github.com/hs2002-18/Self-Healing-Infrastructure.git
            fi

            cd Self-Healing-Infrastructure
            git pull origin master

            cd docker

            # Restart containers
            docker-compose down
            docker-compose up -d

            #Go back to root
            cd ..
            
            # Start self-healing script
            chmod +x scripts/auto_heal.sh
            nohup ./scripts/auto_heal.sh > heal.log 2>&1 &
